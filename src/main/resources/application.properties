spring.application.name=pdfai
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
ai.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:meta/llama-3.1-8b-instruct}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:60}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:*}
